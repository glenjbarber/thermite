#!/bin/sh
#
# $FreeBSD$
#

BUILDBRANCH="10"

. "${__BUILDCONFDIR}/defaults-${BUILDBRANCH}.conf"

TARGET="amd64"
TARGET_ARCH="amd64"

__CONFIG_NAME="${BUILDBRANCH}-${TARGET_ARCH}-${KERNEL}-${BUILDTYPE}"
CHROOTDIR="${__WRKDIR_PREFIX}/${__CONFIG_NAME}"

WITH_VMIMAGES=1
WITH_COMPRESSED_VMIMAGES=1
WITH_CLOUDWARE=1
AWSREGION=us-west-2
AWSBUCKET=freebsd-release-staging
AWSKEYFILE=/root/Amazon-EC2
EC2PUBLIC=1
AZURE_UPLOAD_CONF=/root/Microsoft-Azure
