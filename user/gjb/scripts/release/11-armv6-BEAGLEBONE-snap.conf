#!/bin/sh
#
# $relengid$
#
. ./defaults-11.conf
TARGET="amd64"
TARGET_ARCH="amd64"
SRCBRANCH="base/head@${_SVNREV}"
NODOC=yes
NOPORTS=
set -a
RELENGDIR="$(realpath $(dirname $(basename ${0})))/../release"
WORLD_FLAGS="-j10"
KERNEL_FLAGS="-j6"
EMBEDDEDBUILD=1
EMBEDDEDPORTS="lang/python textproc/gsed"
XDEV="arm"
XDEV_ARCH="armv6"
XDEV_FLAGS="WITH_GCC=1 WITH_GCC_BOOTSTRAP=1 WITHOUT_CLANG_IS_CC=1"
KERNEL="BEAGLEBONE"
CROCHETSRC="https://github.com/kientzle/crochet-freebsd"
CROCHETBRANCH="trunk"
__CONFIG_NAME="11-armv6-${KERNEL}-snap"
CHROOTDIR="${__WRKDIR_PREFIX}/${__CONFIG_NAME}"
set +a
