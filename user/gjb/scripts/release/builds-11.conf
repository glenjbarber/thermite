#!/bin/sh
#
# $relengid$
#
use_zfs=1
emailgoesto="gjb@FreeBSD.org"
scriptdir="$(dirname $(realpath ${0}))"
srcdir="${scriptdir}/../release"
logdir="${scriptdir}/../logs"
chroots="${scriptdir}/../chroots"

releasesrc="head/release"
heads="11"
stables=

revs="${heads} ${stables}"
archs="amd64 i386 powerpc powerpc64 sparc64 armv6"
types="snap"

x86_kernels="GENERIC"
armv6_kernels="BEAGLEBONE RPI-B PANDABOARD WANDBOARD-QUAD ZEDBOARD"

kernels="${x86_kernels} GENERIC64 ${armv6_kernels}"

ftpdir="/relengftp"
ftpsubdir=""

relengdir=

case $(hostname -s) in
	snap)
		zfs_root="zroot"
		zfs_mount="snap/releng"
		zfs_parent="${zfs_root}/${zfs_mount}"
		relengdir="/snap/releng"
		;;
	grind|releng1|releng2)
		zfs_root="zroot"
		zfs_mount="releng"
		zfs_parent="${zfs_root}/${zfs_mount}"
		relengdir="/releng"
		;;
	*)
		use_zfs=0
		;;
esac

# These are separate from the variables used by the individual release
# configuration files for now.
BUILDSVNREV="271779"
BUILDDATE="20140918"

